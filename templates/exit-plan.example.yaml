  created_at: "YYYY-MM-DD"
  source_position_id: "POS-YYYYMMDD-0001"
  source_trade_plan_id: "TP-YYYYMMDD-0001"
  exit_type: "take_profit"
  urgency: "normal"

stock:
  code: "000001"
  name: "示例股票"
  exchange: "SZSE"
  industry: "示例行业"

