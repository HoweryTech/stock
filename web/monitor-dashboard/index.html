<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>持仓监控台</title>
  <link rel="stylesheet" href="/styles.css?v=20260722-focus">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>持仓监控台</h1>
      <p id="updatedAt">等待第一轮数据</p>
    </div>
    <div class="header-status">
      <span class="status-dot" id="statusDot"></span>
      <span id="monitorStatus">连接中</span>
      <span class="latency" id="latencyText">--</span>
    </div>
  </header>

  <nav class="tabs" aria-label="视图切换">
	    <button class="tab active" data-view="positions">持仓</button>
	    <button class="tab" data-view="candidates">选股</button>
	    <button class="tab" data-view="events">事件</button>
  </nav>
  <section id="globalReviewBar" hidden></section>

  <main>
    <section class="urgent-trigger-alert" id="urgentTriggerAlert" hidden></section>
    <section class="refresh-alert" id="refreshAlert" hidden></section>
    <section class="today-focus" id="todayFocus" aria-label="当前优先事项"></section>
    <details class="secondary-dashboard" id="secondaryDashboard">
      <summary><span>辅助信息</span><em>触发复核、自检、阻断原因和资金约束</em></summary>
      <section id="intradayReviewMount"></section>
      <section id="sessionPreflightMount"></section>
      <section id="blockerSummaryMount"></section>
      <section id="capitalUsageMount"></section>
    </details>

    <section class="toolbar" id="positionsToolbar">
      <label class="search-box">
        <span>搜索</span>
        <input id="searchInput" type="search" placeholder="代码或名称" autocomplete="off">
      </label>
      <div class="filter-group" aria-label="风险筛选">
        <button class="filter active" data-filter="all">全部</button>
        <button class="filter" data-filter="exit_risk_review">退出风险</button>
        <button class="filter" data-filter="market_wait">等待时段</button>
        <button class="filter" data-filter="data_insufficient">数据不足</button>
        <button class="filter" data-filter="positive_t_watch">正T观察</button>
        <button class="filter" data-filter="reverse_t">反T观察</button>
        <button class="filter" data-filter="post_unlock_candidate">人工候选</button>
        <button class="filter" data-filter="post_unlock_blocked">复核阻断</button>
        <button class="filter" data-filter="technical_unlock">接近解锁</button>
        <button class="filter" data-filter="no_add_watch">禁止补仓</button>
        <button class="filter" data-filter="observe">观察</button>
      </div>
      <div class="focus-bar" id="focusBar" hidden></div>
    </section>

	    <section id="positionsView" class="view active">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>证券</th>
              <th class="number">现价 / 涨跌</th>
              <th class="number">持仓盈亏</th>
              <th class="number">仓位</th>
              <th>状态</th>
              <th>建议</th>
              <th class="number">主力净额</th>
              <th class="number">行情延迟</th>
            </tr>
          </thead>
          <tbody id="positionsBody"></tbody>
        </table>
      </div>
      <div class="mobile-list" id="mobileList"></div>
      <div class="empty-state" id="emptyState" hidden>没有符合条件的持仓</div>
	    </section>

	    <section id="candidatesView" class="view">
	      <section class="candidate-toolbar" aria-label="选股筛选">
	        <label class="search-box">
	          <span>搜索</span>
	          <input id="candidateSearchInput" type="search" placeholder="代码、名称或行业" autocomplete="off">
	        </label>
	        <label>
	          <span>交易所</span>
	          <select id="candidateExchangeFilter"></select>
	        </label>
	        <label>
	          <span>板块</span>
	          <select id="candidateBoardFilter"></select>
	        </label>
	        <fieldset class="candidate-permission-filter">
	          <legend>排除无权限</legend>
	          <label><input type="checkbox" data-candidate-exclude-board="star">科创板</label>
	          <label><input type="checkbox" data-candidate-exclude-board="chinext">创业板</label>
	          <label><input type="checkbox" data-candidate-exclude-board="bse">北交所</label>
	        </fieldset>
	        <label class="candidate-focus-toggle">
	          <input id="candidateFocusOnly" type="checkbox">
	          <span>重点观察</span>
	        </label>
	        <label>
	          <span>行业</span>
	          <select id="candidateIndustryFilter"></select>
	        </label>
	        <label>
	          <span>策略</span>
	          <select id="candidateStrategyFilter"></select>
	        </label>
	        <label>
	          <span>组合状态</span>
	          <select id="candidatePortfolioFilter"></select>
	        </label>
	        <label>
	          <span>质量</span>
	          <select id="candidateQualityFilter"></select>
	        </label>
	        <label>
	          <span>技术面</span>
	          <select id="candidateTechnicalFilter"></select>
	        </label>
	      </section>
	      <section class="candidate-summary" id="candidateSummary"></section>
	      <div class="table-wrap candidate-table-wrap">
	        <table class="candidate-table">
	          <thead>
	            <tr>
	              <th><button type="button" data-candidate-sort="code">证券</button></th>
	              <th><button type="button" data-candidate-sort="board">板块</button></th>
	              <th><button type="button" data-candidate-sort="combined_score">综合分</button></th>
	              <th><button type="button" data-candidate-sort="latest_price">价格</button></th>
	              <th><button type="button" data-candidate-sort="strategy_count">策略</button></th>
	              <th><button type="button" data-candidate-sort="industry_strength_score">行业强度</button></th>
	              <th><button type="button" data-candidate-sort="liquidity_score">流动性</button></th>
	              <th><button type="button" data-candidate-sort="risk_penalty_score">风险扣分</button></th>
	              <th><button type="button" data-candidate-sort="technical_health_score">技术面</button></th>
	              <th><button type="button" data-candidate-sort="expected_total_position_pct_after_buy">买入后总仓位</button></th>
	              <th>组合状态</th>
	            </tr>
	          </thead>
	          <tbody id="candidateTableBody"></tbody>
	        </table>
	      </div>
	      <div class="mobile-list candidate-mobile-list" id="candidateMobileList"></div>
	      <div class="empty-state" id="candidateEmptyState" hidden>没有符合条件的候选股</div>
	    </section>

	    <section id="eventsView" class="view">
      <div class="event-list" id="eventList"></div>
    </section>
  </main>

  <aside class="detail-panel" id="detailPanel" aria-hidden="true">
    <div class="detail-header">
      <div>
        <p id="detailCode"></p>
        <h2 id="detailName"></h2>
      </div>
      <button class="close-button" id="closeDetail" aria-label="关闭详情" title="关闭">×</button>
    </div>
    <div id="detailContent"></div>
  </aside>
  <section class="confirm-modal" id="manualTradeConfirm" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="manualTradeConfirmTitle">
    <div class="confirm-dialog">
      <div class="confirm-header">
        <div>
          <p>成交写入确认</p>
          <h2 id="manualTradeConfirmTitle">确认更新持仓</h2>
        </div>
        <button class="close-button" id="manualTradeCancelTop" type="button" aria-label="关闭确认" title="关闭">×</button>
      </div>
      <div class="confirm-body" id="manualTradeConfirmBody"></div>
      <p class="confirm-error" id="manualTradeConfirmError" hidden></p>
      <div class="confirm-actions">
        <button class="secondary-action" id="manualTradeCancel" type="button">取消</button>
        <button class="primary-action danger-action" id="manualTradeConfirmButton" type="button">确认写入并刷新</button>
      </div>
    </div>
  </section>
  <div class="scrim" id="scrim" hidden></div>

  <script src="/replay.js?v=20260718-replay" defer></script>
  <script src="/review.js?v=20260722-review-closure" defer></script>
  <script src="/preflight.js?v=20260720-preflight" defer></script>
	  <script src="/blockers.js?v=20260719-blockers" defer></script>
	  <script src="/capital.js?v=20260719-capital" defer></script>
	  <script src="/candidates.js?v=20260722-focus-candidates" defer></script>
	  <script src="/app.js?v=20260722-lean-home" defer></script>
</body>
</html>
